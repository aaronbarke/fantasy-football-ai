name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi 'uvicorn[standard]' 'sqlalchemy[asyncio]' aiosqlite \
            alembic pydantic pydantic-settings email-validator httpx anthropic \
            'apscheduler<4' redis PyJWT bcrypt python-dateutil pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest -q
